easy_diff_desc="Only one specimen at a time with 20+ rooms in between."
normal_diff_desc="Rare multichases with variable rooms in between."
hard_diff_desc="Common multichases with very few rooms in between. Stamina is persistent."
hardest_diff_desc="Permanent multichase! Ledges aren't safe anymore."
evil_diff_desc="Random specimen behaviors, locked doors, and everything else from Hardest Mode. Don't take this mode seriously, it's pure hell."
