[SET_DESC]
fov=Vertical FOV of the camera.
dynamic_fov=FOV correlates with movement speed.
fps=Frames per second.
fps_update=How often the framerate is displayed.
tps=Ticks per second.
sens=Camera sensitivity.
vol=Volume of all sounds.
mus_vol=Volume of music and ambience.
mon_vol=Volume of monster specific sounds.
sfx_vol=Volume of sound effects.
voice_vol=Volume of voice lines. Doesn't apply to monsters.
reduce_flash=Reduce flashing lights.
lang=Language for text.
crouch_toggle=Crouch is toggled rather than held.
max_part=Maximum number of 3D particles that can render at a time.
vsync=Vertical Sync. Can prevent screen tearing.
anti_alias=Anti aliasing. Blurs textures, but doesn't affect the screen.
sub=Subtitles for voice lines and monsters. Sound effects don't have subtitles unless all is selected.
fullscreen=Fullscreen.
color=How rooms are colored. Selecting room makes only walls, floors, and ceilings affected by room color.
coll_prec=Collisions are precise. Turning this off may improve performance, but cause more bugs.
move_bob=How much the camera bobs when moving.
idle_bob=How much the camera bobs when idle.
shake_type=How screen shaking is handled. Classic only affects camera position, while modern only affects camera angle.
mem_save=Try and save memory. This mostly disables Killer's directional sprites.
mon_hud=Show the monsters chasing in the bottom left. Selecting duration will show their current chase duration as well.
rm_hud=Show the current room in the top right.
bar_hud=Show health and stamina in the top left. Selecting classic will disable bars to make it as close to 1.2 as possible.
tps_hud=Show current TPS and FPS in the top left. Useful when the game is in fullscreen mode.
name=Which names to use for the monsters. Names for Original are sourced from the code, names for Renovation are sourced from the Renovation devs, and fanon is sourced from the wiki.
res_w=Width of the resolution.
res_h=Height of the resolution.
back=Go back to the previous menu.
apply=Apply settings. (CANNOT BE UNDONE)
reset=Reset settings. (CANNOT BE UNDONE)
invert_yaw=Invert camera yaw control.
invert_pitch=Invert camera pitch control.
killer_voice=Killer voice to use. Voiced by Vernon Shaw, DirectorFlik, Spook Lass, and Ryan J respectively. Vernon Shaw might've been cancelled for something, we don't know.
reset_spd=Reset speed multiplier when certain events occur. Locale includes monster spawns and locales.
rand_theme=Randomize theme when monsters spawn, including sometimes not playing.
wake_3d=Monster wake sounds are attenuated. Only exception is White Face.
amb_3d=Ambience sounds are attenuated.
