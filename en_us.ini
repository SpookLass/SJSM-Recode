body=In Recode, its incredibly fast, but in return gives the player infinite stamina.
stem=In Recode, they spawn in a random spot, but can be axed.
patient=In Recode, Patient speeds up more and more when looked at, but moves really fast when not looked at. You gotta balance looking at them and not.
gc=In Recode, Ghost Cow assumes their OG behavior in Recode, be careful. They rush towards you when looked at, and spawn in a random spot behind you.
bekka=In Recode, they spawn at the exit door briefly every other room.
ringu_real=In Recode, shes slower when looked at in her first form, but faster in her second. Just dont look at her when the camera flashes.
otto=In Recode, this guy is a joke lol.
tiri=In Recode, her shadows only take one hit, and she can be seen through walls. Use this to your advantage.
lisa=In Recode, shes physical, and reappears when not in view. Be careful, shes still fast. She also retains her visible phase, although not the speed boost that comes with it.
spooper=In Recode, the health drain cannot kill you. Only vommitting can, which is induced by the floating goo thing.
wf=In Recode, they assume their OG behavior with various bug fixes and nerfs. Just try not to look at it, it gets a massive speed boost if you do.
