sm_desc="It's story mode. Don't worry, I'll come up with something better later, I just don't feel like it. [COMING EVENTUALLY]"
em_desc="Explore the infinite mansion for unknown terrors! I swear to god why did they make this canon"
sb_desc="Play around with debug! [COMING EVENTUALLY]"
recode_type_desc="The default behavior for recode. Specimens tend to be more balanced for combos, and attempt to represent both their original and renovation counterparts."
og_type_desc="The original game. Specimens tend to be more basic and less balanced. Despite attempting to be as accurate as possible, there are a few slight differences between this and the original game, most notable of which being bug fixes. You are not guaranteed to be able to survive all chases given you get bad RNG."
hd_type_desc="The HD renovation. Specimens tend to be more complex and less balanced. Despite attempting to be as accurate as possible, there are a few slight differences between this and HD Renovation, most notable of which being visuals. You are not guaranteed to be able to survive all chases given you get bad RNG."
