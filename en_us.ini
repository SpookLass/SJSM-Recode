pt=This was such a surprise. That there would be another entry. Another actual entry. One I could admire.##But then as suddenly as it came, it left.##And now you disband.##Your influence and inspiration will never leave me.
story_a_01=At first this place just seemed cute, but I've been here for days now...##I'm feeling quite parched now, and I keep getting this feeling like I am being watched by something.####This is not romantic at all...
story_a_02=I know something is following me, but I feel like I am prancing through the same rooms over and over..##Hopefully leaving notes as breadcrumbs will prove I am making progress and reaching some destination.##I just hope I don't run out of ink. I am dreadfully thirsty...
story_a_03=Ink...##Not quite quenching my thirst. Taste is terrible, stains are terrible.##I don't think drinking it was a very romantic idea.
story_a_04=I found something today to satisfy my unromantic thirst. I awoke today from a brief faint, and found before me a bottle of red wine!##I am not sure what brand or year, for there is no label. All I gather is that it tastes strongly metallic.
story_a_05=I don't think that was wine...
story_a_06=I don't know how much longer I can go on...##I haven't  seen any of my previous notes, so that means either I'm getting somewhere or someone is taking them.
story_a_07=I think this is my last note. I'm going to die having never found my escape, but really that's not true. This place was like my escape. My escape from everything else. In the end my death is kind of romantic.
story_b_01=This place is finally starting to affect me.##I've seen enough horror movies to know how to survive a simple ghost or two, but these monsters keep getting faster and stranger.
story_b_02=In order to survive this house I need to keep writing notes.##I must do everything a central protagonist would and hope this is one of those stories.##'Insert Obscure horror reference that no one gets and misinterprets as instructions somehow'
story_b_03=Well I still haven't died so it appears I might be the protagonist, but I'm  not entirely sure.##I hope I'm not some side character that leaves notes for pointless exposition.##Also I found a strange computer that gave descriptions of the monsters. And it seems like they are called 'effective' based on how many people they kill.
story_b_04=I think the 'effectiveness' of the Specimens is also somehow related to the souls of the people they kill somehow...##Anyway I'm still alive and strong, but I feel like the inmost cave of my journey lies ahead. I wonder what the antagonist will look like.##I hope they're cute.
story_b_05=I just realized that I never had a mentor figure, trial, or leaving home scene.##That means this story isn't following the archetypes to make me a traditional hero.##Which means I can be killed off.##Well it was nice for a little while at least.
story_b_06=In order to survive this house I need to keep writing notes.##I must do everything a central protagonist would and hope this is one of those stories.##I've also got to try as hard as I can to not pick up any other notes I find.##Because I think that summons that tall man character.
story_c_01=DAY 2.##Food supply depleted. Water supply at 30%. Mental health deteriorating, leaving notes behind to help others and mark where I've been.
story_c_02=DAY 3.##Hallucinations are manifesting at increasing intervals. The cause is probably sleep deprivation or a gas that is being pumped into the rooms. I have not yet been injured so I don't think the cause is a brain injury or blood clot.
story_c_03=DAY 4.##I'm starting to lose track of time.##The battery on my phone became very low so I delegated to save it in case I find an exit.
story_c_04=DAY 5.##I can't remember. Why did I come here?##Was there ever a purpose?##I believe death is steadily approaching me now. The hallucinations can hurt me, I'm out of provisions, and I'm having sudden violent heart palpitations.
story_c_05=DAY 7.##I can't tell the real from unreal anymore. My limbs refuse to move the way I want them to. I feel like I'm wading in a deep river that is always flowing against my direction.##Now I will lay down and let the river flow over me. I will let it guide me to it's end.##I know where I'm going anyway. This place,this entire place, is just a gyrating screaming rock in the vastness of an infinite kingdom.##I'm going to rest now. I'll be watching over you.
em_a_01=Aha!##Yet again I have cheated the grave and shall proceed to escape these confines.##While the thought of my death being quite romantic did cross my mind I believe my escape shall be profusely more so.
em_a_02=I am still filled with vigor after my experience the other day. My hunger and thirst have both left me leaving me with nothing but distilled romanticism.
em_a_03=Now even the monsters and other incorporeal beings seem to be deterred from attacking me. They do notice me it seems but they don't act as imposing as they once were.##Clearly due to my renewed romantic determination!
em_a_04=A strange ghost girl appeared before me today in a rather upset and unromantic manner. She claims I am not doing my job and that I should report to my commanding officer immediately. I boldly stated that I have no commander as I drift wherever the wind takes me as I follow my own romantic journey. To this she acted confused and slowly sunk into the floor.
em_a_05=I am beginning to wonder why I haven't required sustenance in what I guess has been more than two weeks. I at first theorized that tiny food particles are emitted into the air.##I now know what a foolish thought that was since it is clear that I have been granted immortality as a romantic artist.
em_a_06=I noticed something strange today.##My skin color has changed.##I know this is probably ordinary since I haven't seen the sun in quite some time but it just came as a shock to me. But I know my romantic partner is out there and they will care for me no matter how transparent my skin becomes.
em_a_07=The ghost girl has returned and is glaring at me while I write this. She again claims I have a job here and that I'm not fulfilling it correctly. I tell her whatever job she thinks I have doesn't sound very romantic. She seems angrier now and states that if I don't stop she will take my pen privile___
em_b_01=Mommy and Daddy love me very much!##They told me they were throwing me a party!
em_b_02=Where is Daddy? He told me that the party was going to be here.
em_b_03=Mommy gave me a basket of cookees. for my party..##I've eaten some.
em_b_04=Why are there noises? Is Mommy or Daddy following me? Is this a game?
em_b_05=I fell down a hole.. My leg hurts alot and I cried.
em_b_06=I fell asleep. My leg still hurts. I see Daddy he came for me..##It's not Daddy.
em_c_01=DAy 1##I have enterd a spoopy ghost mansion. I do not know how long I will be here but I hope not too long.
em_c_02=Day 2##Today I saw quite a spook. I'll admit it was scary but not as scary as I've seen in some horror games.
em_c_03=Day 3##I am beginning to get hungry and thirsty. I did bring much food other than my cheesy curds##I hope I will find more food soon.
em_c_04=Day 4##Alright I am tired of this place. today a scary slime man attacked me (sort of) and I ran wawy.
em_c_05=Day 4##I wish I had wifi here. that remains the scariest aspect of all in this palce. I can't check my online profiles or post my daily thoughts.##It is making me build up tension.
em_c_06=Day 6##So I'm pretty much ded now. I don't think I can on and I know the world will miss me, but don't worry wolrd. I am still pretty hardcore for making it this long I suppose but it was a frightful journey (kinda).
em_c_07=Day 7##While I am at the end of my ropes I shall press on anyway. I have eating the last of the cheese curds and haven't found any new food. There is something down the hallway I believe. It's getting closer. OH whyyy. why has this has to happen to me?
em_d_01=So um, I am writing notes down. I think that is the correct thing to do in this situation. I was filming the mansion for my urban  exploration video channel but I think I'm trapped and I ran out of battery on my cameras hours ago.
em_d_02=Hey readers, so everything is ok so far. I can't go back because these elevators only go down but they have to stop somewhere right? I've got enough food for a while and my windup flashlight is working nicely, so we'll see how this goes.
em_d_03=Hey guys, so there are these weird pop outs that appear to be cardboard. I guess this was or is a theme ride of some kind. I just keep going down but I don't have much choice.##All in all it's not that bad.
em_d_04=So everybody, everything is decent at least. Food is almost gone, water too. At the least the foundation of this place seems to be holding and there isn't much mold in the air so I don't have to use my mask. I still want to get out of here soon.
em_d_05=Well readers, I found a greenhouse or garden area. It was pretty neat but it didn't help me much. I did find a cool scythe thing in a 'tree'. I normally don't steal from the places I explore but I have this really uneasy vibe from this place and I want something to defend myself.
em_d_06=Hey everyone, I wish my cameras had battery left. I found some really cool areas of this building. Some looked like a school of  sorts and another might have been some kind of in house restaurant. I found some frozen (meat) there, but I'm not sure if I should attempt to eat it or not.
em_d_07=Okay guys, I am done with this place. As interesting as it may be I think I'm actually in life threatening danger here. I can't  imagine it going on much longer and I've gone way too far down to get back up now.
em_d_08=Well readers, I think I'm near an exit. I found another mansion like area. I feel really tired so I'm going to take a break here.
em_e_01=NOTE I##Dear Reader,##I am known as Jasper Midnight. I appear to be trapped within a house of horrors so to speak. While at first glance I thought this was nothing more than a carnival fun house with scary pop outs and irritating ambience it has lasted quite longer than I expected.##I am going to write these notes as I journey on in order to inform any unfortunate souls that follow me.##Sincerely,##JM
em_e_02=NOTE II##Dear Reader,##Today was an interesting day. I found what appears to be a spider or centipede like creature following me. It was a glorious yet somewhat unfulfilling encounter. After only a few rooms it got away from me.##Sincerely,##JM
em_e_03=NOTE III##Dear Reader,##This mansion just continues to get better. I found a room today that was delightfully themed around rusted and abandoned asylums. I say 'themed' simply because it was too perfect to be real. I even found strange creatures holding onto the grated floor writhing in some sinister dance.##Sincerely,##JM
em_e_04=NOTE IV##Dear Reader,##Hehehehehe##I love this place. It is like nightmare without the haze of sleep or a daydream you would have while drowning. Today I found a creature behind a fake forest of terrible delights. They move without moving and speak through a face without a bottom jaw.##Sincerely,##JM
em_e_05=NOTE V##Dear Reader,##This has been a life changing journey for me. For a long time I felt this emptiness that both hollowed and overwhelmed me. But now I have a place in this world. I no longer feel a coldness within me but rather a growing fire.##Sincerely,##JM
em_e_06=NOTE VI##Dear Reader,##The world is an ashtray, constantly burning out. It is full of hardship, turmoil, happiness, and love. And all of it is beautiful.##Sincerely,##JM
em_e_07=NOTE VII##Dear Reader,##My life is spent, my fire snuffed. My body shakes and ejects blood. I cannot go any further though I wish I could. Continue after me and witness the beauty of the world. Witness the terrible and terrific.##Sincerely,##JM
em_f_01=Research Report #153##Through the spider portal I have come across a plethora of new horror designs for Specimen 1 as well as some new ways of recruiting soldiers.##In today's dive I discovered a cluster of webs centered around short horror experiences as well as some sort of Italian cooking. I will continue to research this particular web cluster.
em_f_02=Research Report #154##Today's dive inspired me to create a design for Specimen 1 that I think will be more effective. It seems this creature known as Jeff is terrorizing the world above. Further research on other webs led me to believe there are multiple Jeffs, some even crossbreeding with other monsters. It goes without saying the offspring may prove interesting.
em_f_03=Research Report #155##Today an idiot GL Labs worker thought to question my concept for the new design. They stated that whatever creature Jeff is, he certainly does not resemble my design. I countered by showing them the stacks upon stacks of images depicting him as I have and then skewering him in the ribs with my knife.
em_f_04=Research Report #156##Recruitment is just barely staggering along and I need to do something about it.##From research gathered in today's dive I believe I have the solution. We need to attract one of these LP people to the house. After they are here I believe other LP people and 'viewers' will flock in.
em_f_05=Research Report #157##I have started my plan to attract the LP people to the house. I have sent hundreds of identical notices to a couple of the big LP people. So far most have gone unseen, so I have today enlisted all GL Lab slaves to copy the message I've written and post it as frequently as possible.
em_f_06=Research Report # 158##Today in the spider portal we got a few replies to our brochure for the house. Most stated that we were some kind of canned meat product, but a few seemed positive. I'm now shutting down the advertising campaign to focus all of our workers into beefing up the recruitment strategies.
em_f_07=Research Report #159##Well this morning, or evening, or afternoon, I can't really tell down here, a worker from GL Labs brought me distressing news about the title of our house. It seems another house far away already has our title somehow and wants us to change ours. They must have a larger ghost army than ours, so further investigation is required.
em_f_08=Research Report #160##Today the worker said with enough funds we can dismiss this title metamorphosis, but I've decided to keep all funds toward dried noodle sustenance and scary things. I'm not sure how this other mansion is going to benefit from this. However, all other news is good and the next wave of monsters are about ready.

