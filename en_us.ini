[DESC]
back=Go back to the previous menu.
type=Edit behaviors for specific monsters and features.
story=Experience 1000 rooms of cute terror! (COMING EVENTUALLY)
endless=Explore the infinite mansion for unknown terrors!
sandbox=Play around with debug! (COMING EVENTUALLY)
recode=The default behavior for Recode. Monsters tend to be more balanced for combos, and attempt to represent both their Original and Renovation counterparts.
og=The Original game. Monsters tend to be more basic and less balanced. Despite attempting to be as accurate as possible, there are a few slight differences between this and the Original, most notable of which being bug fixes. You are not guaranteed to be able to survive all chases given you get bad RNG.
hd=The HD Renovation. Monsters tend to be more complex and less balanced. Despite attempting to be as accurate as possible, there are a few slight differences between this and HD Renovation, most notable of which being visuals. You are not guaranteed to be able to survive all chases given you get bad RNG.
easiest=No monsters. Rooms never lock.
easy=Only one specimen at a time with 20+ rooms in between. Rooms only lock when the player is alone.
normal=Rare multichases with variable rooms in between.
hard=Common multichases with very few rooms in between. Stamina is persistent.
hardest=Permanent multichase!
evil=Random specimen behaviors, locked doors, falling off pits, and everything else from Hardest Mode. Don't take this mode seriously, it's pure hell.
crouch=The player can crouch on command.
jump=The player can jump on command.
stam_per=The player's stamina persists between rooms.
fall=The player can fall of ledges.
lock=How locked rooms are handled.
dmg_shake=The player's camera gets shifted when they take damage.
mult_type=How multichases are handled. Min is always the minimum value, max is always the maximum value, and taper lerps the values between chase start and end.
mult_min=Minimum number of specimens that can chase.
mult_max=Maximum number of specimens that can chase.
mult_start=When multichase tapering starts if taper is selected.
mult_end=When multichase tapering stops if taper is selected.
count_type=How the number of rooms between chases is handled. Min is always the minimum value, max is always the maximum value, random is a random range between both values, and taper lerps the values between count start and end.
count_min=Minimum number of rooms between chases.
count_max=Maximum number of rooms between chases.
count_start=When count tapering starts if taper is selected.
count_end=When count tapering stops if taper is selected.
dupe=Monsters can multichase with copies of themselves. Only some monsters can if canon is chosen when it fits with their lore.
mon_chance=How often monsters chase. One out of the value specified.
mon_chance_mult=How much the chance is multiplied by the number of monsters. One out of the base chance plus the multiplier times the number of monsters.
js_chance=How often jumpscares occur.
ele_type=How many different elevator rates there are.
ele_end_01=When elevator rate one switches to elevator rate two if elevator type is one or more.
ele_end_02=When elevator rate two switches to elevator rate three if elevator type is two.
ele_rate_01=How often elevators appear before elevator end one.
ele_rate_02=How often elevators appear after elevator end one and before elevator end two if elevator type is one or more.
ele_rate_03=How often elevators appear after elevator end two if elevator type is two.
rare_chance=How common rare rooms are when the player isn't being chased.
spec_list=Which specimens from Story Mode can appear in the chase pool. Story lacks unused specimens. Original endless lacks flesh, mermaid, and unused specimens. Beta replaces used specimens with their unused counterparts. No Ringu is for use with Endless Ringu.
mon_list=Which monsters from Karamari Hospital can appear in the chase pool. There is no difference if Karamari Hospital is not present. HD Renovation lacks Security Guard. Original lacks both Security Guard and Body Bag.
doll_list=Which dolls from Dollhouse can appear in the chase pool. HD Renovation lacks Frenzy.
endless_list=Which Endless Specimens can appear in the chase pool.
unknown_list=Which Unknown Specimens can appear in the chase pool.
locale=Locales will appear. (COMING EVENTUALLY)
permadeath=Save will be lost on death.
one_shot=Players will die in one shot for an extra spicy challenge.
player=You, the player.
player_recode=Accelerates and moves the same speed in all directions.
player_og=Accelerates and moves slower when not moving forward.
player_hd=Doesn't accelerate and moves the same speed in all directions, although at a significantly slower pace.
axe=The axe.
axe_recode=Can be swung instantly.
axe_og=Can be swung instantly.
axe_hd=10 stamina is required to raise and has a short delay before being swung.
js=The cardboard jumpscare
js_recode=Has quick animation and stops the player in place when not being chased.
js_og=No animation and stops the player no matter what.
js_hd=Has animation and stops the player no matter what.
js_alt=Has animation and forces the player to look at it.
gel=The semisolid spectre that creates puddles.
gel_recode=Floats over pits and spawns from puddles.
gel_og=Floats through walls.
gel_hd=Floats over pits, spawns from puddles, moves much faster, and has an attack delay.
brain=The bitter former specimen.
brain_recode=Taunts the player and predicts their movements in endless mode.
brain_og=Almost guaranteed to kill the player once released.
brain_hd=Almost guaranteed to kill the player once released.
bug=The spider centipede hybrid that burrows.
bug_recode=Guaranteed to spawn from holes and accelerates quickly.
bug_og=Has a chance to spawn from holes and moves slowly.
bug_hd=Guaranteed to spawn from holes and accelerates quickly.
bug_rogue=From the mod Gone Rogue. Gains speed linearly, making them much more hazardous.
ringu=The 14th century spirit that phases through walls.
ringu_recode=Has a silhouette to see them through walls.
ringu_og=No notable version differences.
ringu_hd=No notable version differences.
ringu_old=Left in the code of the HD Renovation. Much faster than usual.
bab=The church creature that warps your vision.
bab_recode=Leaves a trail of after images and plays strange ambience, and can be pushed back with the axe. Hallucinations don't affect doors. 
bab_og=Very slow in story mode. Hallucinations affect doors.
bab_hd=Leaves a trail of afterimages. Hallucinations don't affect doors.
bab_old=From very early versions of the Original game. No longer has any hallucinations, moves very slowly, and sometimes stops the player in place or drains their stamina.
pup=The puppet merchant that moves when not watched.
pup_recode=Rises out of view when not looked at and has a chance to resist the axe.
pup_og=Phases through walls and has a chance to resist the axe.
pup_hd=Attempts to teleport onto the player after a certain amount of time, failing if the player is moving backwards.
pup_old=From an early version of the Original game. Spawns in sooner and doesn't teleport.
pup_dh=From the Original Dollhouse Hellgate. Spawns in sooner and can get up.
pup_dh_hd=From the HD Renovation Dollhouse Hellgate. Spawns in sooner and can get up.
flesh=The wall of moving anatomy symbols.
flesh_recode=Balanced to make sure the player can make it through the room without getting cut off, does damage over time, and has arrows to guide the player.
flesh_og=No notable version differences.
flesh_hd=Moves much slower than usual.
flesh_alt=Based on the Recode variant. No longer forces flesh rooms, chasing in any room.
dl=The lord of deer that reduces the player's iron levels.
dl_recode=Floats over pits, warps through walls, and can be stunned by the axe.
dl_og=Phases through walls.
dl_hd=Floats over pits and warps through walls.
dl_old=From the code of HD Renovation. Has more spawn delay and has a more generous warping distance.
dl_rogue=Becomes faster the further away they are.
dl_remodeled=From the mod Remodeled. Gains speed when not looked at, but becomes incredibly fast when looked at for too long.
taker=The red clay skull that TAKES THE DEAD.
taker_recode=Spawns after about 2 minutes and kills in one hit.
taker_og=Spawns after 2 minutes.
taker_hd=Spawns after 70 seconds and kills in one hit.
taker_dh=Spawns after 46 seconds, moves quickly, and kills in one hit.
eel=The eel worm hybrid that got replaced.
eel_recode=Moves faster, but is vulnerable to the axe.
eel_og=No notable version differences.
eel_hd=No notable version differences.
eel_remodeled=From the mod Remodeled. Moves incredibly quickly and cannot be stopped.
para=The parasite that becomes something else after distance is made.
para_recode=Their form never resets, but is much slower and accelerates.
para_og=Resets their form every room.
para_hd=Resets their form after attacking the player. The leech accelerates.
para_old=From early versions of the Original game. Transforms much more rarely, takes longer to enter the room, and moves much more slowly in their leech form.
fd=The demon made of meat that hides the doors.
fd_recode=The open prompt is also hidden when the doors are. Moves much faster when looked at, has a silhouette, and has a flame above their head.
fd_og=Moves much faster when looked at.
fd_hd=Has a flame above their head.
fd_dh=Theoretical Original Dollhouse Hellgate. Works like the Original, but spawns meat.
fd_dh_hd=From the HD Renovation Dollhouse Hellgate. Spawns meat.
killer=The host possessed by a mansion.
killer_recode=Sprints, but does not accelerate.
killer_og=Moves incredibly slowly.
killer_hd=Sprints and accelerates.
killer_old=From the files of HD Renovation. Slower when walking, faster when running.
killer_remodeled=From the mod Remodeled. Sprints for much longer, and keeps sprinting between rooms.
killer_rogue=From the mod Gone Rogue. Sprints and accelerates linearly.
killer_alt_01=Waits a long time to enter the room, then rushes the player at high speeds, resuming normal behavior when hitting the player.
killer_alt_02=Player 9. Has basically the same stats as the player, making them a formidable foe.
mur=The mermaid that hides underwater.
mur_recode=(COMING EVENTUALLY)
mur_og=(COMING EVENTUALLY)
mur_hd=(COMING EVENTUALLY)
sg=The security guard that appears somewhere in the room.
sg_recode=Charges the player when they get close.
sg_og=Charges the player when they get close. The size of their hitbox makes them incredibly unfair.
sg_hd=Wanders until approached. The size of their hitbox makes them incredibly unfair. Drains stamina instead of health.
sg_kh=Wanders until approached. The size of their hitbox makes them incredibly unfair.
body=The living bodybag.
body_recode=Gives the player infinite stamina, but moves much faster in return. Respawns after attacking.
body_og=Gives the player infinite stamina and causes a strobing effect.
body_hd=Accelerates quickly and respawns after attacking.
body_old=From the old versions of HD Renovation. Floats over gaps.
body_kh=From the HD Renovation version of Karamari Hospital. Gives infinite stamina and doesn't respawn after attacking.
body_alt=Based on the mod Remodeled. SPEEN!
stem=The baby head in a cage.
stem_recode=Accelerates more naturally and teleports when attacked.
stem_og=Accelerates linearly and cannot be attacked.
stem_hd=Gets a random boost, but can't move unless facing the player. Teleports when attacked.
stem_kh=From the Original version of Karamari Hospital. Deals slightly more damage, moves slower.
stem_kh_hd=From the HD Renovation of Karamari Hospital. Moves slower and cannot be attacked.
stem_old=From the code of HD Renovation. Spawns after a short delay.
stem_alt=Based on the Recode variant, but has the boost from the HD variant. This combination causes them to slide around everywhere.
patient=The hanging patient that has a complicated relationship with being looked at.
patient_recode=Gains speed while being watched. Moves quickly while not being watched. Floats over pits.
patient_og=Moves slowly while being watched and eventually teleports. Moves quickly while not being watched.
patient_hd=Gains speed while being watched and eventually teleports. Teleports on top of the player if not watched for too long.
patient_alt=Looks like the HD Renovation variant, acts like the Original variant.
gc=The mad cow that transforms the surroundings.
gc_recode=Warps quickly when looked at, with a generously small sight cone. Creates a dense fog around the player and reduces the FOV.
gc_og=Warps quickly when looked at. Reduces the draw distance and FOV.
gc_hd=Floats over pits and is vulnerable to the axe.
gc_kh=From the Original Karamari Hospital. Teleports forward rapidly rather than moving normally. Has no screen effects.
gc_kh_hd=From the HD Renovation Karamari Hospital. Not vulnerable to the axe. Has no screen effects.
gc_alt=Cow. Basically the HD variant upside down.
gc_kh_recode=Accelerates quickly but respawns when attacked.
bekka=The Friday lady.
bekka_recode=Briefly appears at the exit door every other room.
bekka_og=Makes the rooms incredibly dark.
bekka_hd=Has a random chance to appear at the exit door for 3 seconds.
bekka_remodeled=From the mod Remodeled. Can appear at the exit or entrance door. Once she vanishes, she covers the screen in darkness and deals rapid damage.
bekka_rogue=Occasionally warps to where the player is looking.
bekka_alt=Like the Recode variant, but appears unmoving at the exit door.
husk=The group of possessed dolls.
husk_recode=(COMING EVENTUALLY)
husk_og=(COMING EVENTUALLY)
husk_hd=(COMING EVENTUALLY)
wc=The long slimy doll.
wc_recode=Moves faster and deals more damage.
wc_og=Moves slower and has more health.
wc_hd=Wanders until spotting the player and accelerates.
wc_remodeled=From the mod Remodeled. Moves much faster and deals much more damage.
clown=The clown.
clown_recode=No notable version differences.
clown_og=No notable version differences.
clown_hd=No notable version differences.
clown_alt=Deals damage.
hk=The hooked doll that attacks when watched.
hk_recode=Makes rooms more pink, adds lights, and is more affected by the axe.
hk_og=No notable version differences.
hk_hd=No notable version differences.
hk_rogue=Gains speed when looked at for too long, makes rooms more pink, and adds lights.
frenzy=The vengeful spirit that attacks unexpectedly.
frenzy_recode=Applies a grayscale effect, respawns when landing a hit, and grows impatient if not active for too long.
frenzy_og=No notable version differences.
frenzy_hd=No notable version differences.
real_ringu=The upgraded 14th century spirit with vision blocking static.
real_ringu_recode=Has a silhouette and static fog. When looked at, they become slower in their first form, but faster in their second form.
real_ringu_og=Has static overlay. Their second form is faster when not looked at.
real_ringu_hd=Has static fog. Faster than usual.
real_ringu_old=From the code of HD Renovation. Much faster than usual.
tiri=The forest spirit that blocks the path with shadows.
tiri_recode=Gets stunned after attacking. Rooms and fog are colored light blue.
tiri_og=Moves backward after attacking. Shadow animals take 3 hits. Rooms and fog are bright cyan.
tiri_hd=Rooms are light blue.
tiri_old=From the code of the HD Renovation. Moves much faster than usual.
lisa=The rotting corpse of a woman that loops rooms and moves when not watched.
lisa_recode=Becomes visible when not watched and respawns after attacking. Freezes the room counter rather than looping rooms.
lisa_og=Becomes visible when not watched, floats through walls, and teleports backward after attacking.
lisa_hd=Becomes visible and respawns after attacking.
lisa_alt=Based on the Recode variant. Doesn't loop room.
otto=The animatronic otter.
otto_recode=Has glowing eyes.
otto_og=No notable version differences.
otto_hd=Has glowing eyes and gained a slight speed boost.
otto_old=From the code of HD Renovation. Deals significantly more damage.
spooper=The spore parasite that drains health.
spooper_recode=Vomiting only happens when attacked by the goo, and health drain cannot kill.
spooper_og=Vomiting happens at random.
spooper_hd=Vomiting happens at random when not in a combo and health drain is slower.
wf=The digital ghost.
wf_recode=Warps quickly when looked at, with a generously small sight cone. Teleports when the player gets too far away. Freezes the room counter rather than looping rooms.
wf_og=Warps quickly when looked at and can spawn at the exit door. Teleports when the player gets too far away.
wf_hd=Gains speed over time and when looked at. Teleports when the player gets too far away or if looked at for too long.
wf_old=From the code of the Original. Starts fast and becomes slower when looked at. Becomes enraged if looked at for too long.
wf_old_hd=From the code of HD Renovation. Deals incredibly high damage.
wf_imscared=From IMSCARED. Teleports on a timer.
wf_alt=Moves in a clockwise motion around the player when looked at. Teleports when the player gets too far away.
wf_imscared_recode=Teleports on a timer, but vanishes for less time.
howard=The strange jumpscare.
howard_recode=The door is progressed by going around the loop, and shows its progress.
howard_og=The door is progressed by interacting with it.
howard_hd=The door is progressed by going around the loop and interacting with the note.

