wc=Forma dentro forma pulsa e si contorce. Tendini scheletrici si stendono da sotto la pelle che li avvolge. Tira finche' l'elasticita' della pelle non supera il limite. Da questi buchetti finalmente fuoriescono i filamenti ossei.##Sei finalmente libero da questa trappola di carne limitante.
