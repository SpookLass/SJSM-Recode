[NOTE]
lisa_01=Pensa di essere furbo, non e' vero?
lisa_02=La sto guardando da un bel po' ora.
lisa_03=Perche' si disturba a riempire i polmoni?
lisa_04=Il suo sangue ha un odore cosi' forte. Posso sentire i vasi trasudare.
lisa_05=Si sente al sicuro?
lisa_06=Leggere queste non la aiutera'.##Solo la morte puo' aiutarla.
pt=Questa era un'enorme sorpresa. Che ci sarebbe stata un'altra opera. Un'altra effettiva opera. Una che potessi ammirare.##Ma poi, all'improvviso come e' arrivata, se n'e' andata.##E ora ti congedi.##La tua influenza e le tue ispirazioni non mi lascieranno mai.
story_a_01=All'inizio questo posto pareva carino, ma sono stato qui per giorni...##Mi sento un po' arido ora, e continuo a sentirmi come se qualcosa mi stesse guardando.##Questo non e' per niente romantico...
story_a_02=So che qualcosa mi sta seguendo, Ma mi sento come se stessi percorrendo le stesse stanze di continuo..##Spero che queste note dimostrino che sto facendo progressi, come le briciole di pane, che dimostrino che ci sia una destinazione.##Spero solo di non finire l'inchiostro. Sono terribilmente assetato...
story_a_03=Inchiostro...##Non mi disseta molto. Il sapore e' terribile, le macchie sono terribili.##Non penso che berlo fosse stata un'idea romantica.
story_a_04=Oggi ho trovato qualcosa per soddisfare la mia sete poco romantica. Mi sono svegliato da un breve svenimento, e ho trovato una bottiglia di vino rosso!##Non sono sicuro di che brand o anno, vista l'assenza di etichetta. Tutto cio' che capisco e' che ha un sapore veramente metallico.
story_a_05=Non penso che quello fosse vino...
story_a_06=Non so quanto ancora possa continuare...##Non ho visto nessuna delle mie note, il che significa che sto arrivando da qualche parte o che qualcuno le stia prendendo.
story_a_07=Penso che questa sara' la mia ultima nota. Moriro' senza aver mai trovato un'uscita, ma non e' del tutto vero. Questo posto era come una mia fuga. La mia fuga da tutto quanto. Alla fine la mia morte e' un po' romantica.
story_b_01=Questo posto sta finalmente avendo effetto su di me.##Ho visto abbastanza film horror da saper gestire uno spettro o due, ma questi mostri sono sempre piu'  strani e veloci.
story_b_02=Se voglio sopravvivere qua dentro devo scrivere delle note.##Devo fare cio' che un protagonista farebbe e sperare che questa sia una di quelle storie.##'Inserire riferimento horror che nessuno capira' ed interpretera' erroneamente come istruzioni'
story_b_03=Beh, ancora non sono morto quindi potrei essere il protagonista, ma non ne sono del tutto sicuro.##Spero di non essere un qualche personaggio secondario che lascia note per esposizione inutile.##Ho anche trovato uno strano computer che contiene informazioni sui mostri. E sembra che vengano considerati 'efficaci' in base a quante persone uccidono.
story_b_04=Penso che l'efficacia' dei Campioni sia anche in qualche modo correlata alle anime delle loro vittime in qualche modo...##Comunque sono ancora vivo e vegeto, ma mi sento come se la caverna piu' profonda del mio cammino si avvicini. Mi chiedo che aspetto abbia l'antagonista.##Spero che sia carino.
story_b_05=Ho appena realizzato che non ho mai avuto un mentore, una prova, o una scena in cui vado via di casa.##Questo significa che questa storia non sta seguendo gli archetipi per rendermi un eroe tradizionale.##Il che significa che posso essere ucciso.##Beh, e' stato bello per un po' almeno.
story_b_06=Se voglio sopravvivere qua dentro devo scrivere delle note.##Devo fare cio' che un protagonista farebbe e sperare che questa sia una di quelle storie.##Ho anche provato il piu' possibile a non prendere le altre note che trovo.##Perche' penso che altrimenti potrei evocare quell'uomo alto.
story_c_01=GIORNO 2.##Risorse di cibo esaurite. Risorse d'acqua al 30%. La salute mentale sta deteriorando, sto lasciando delle note per aiutare gli altri e segnare dove sono stato.
story_c_02=GIORNO 3.##Si manifestano allucinazioni ad intervalli sempre piu' frequenti. La causa e' probabilmente mancanza di sonno o un gas che viene pompato nelle stanze. Non ho ancora subito ferite quindi dubito che sia un danno al cervello o un coagulo.
story_c_03=GIORNO 4.##Sto perdendo la cognizione del tempo.##Il mio telefono e' quasi morto quindi ho deciso di risparmiare la batteria finche' non trovero' un'uscita.
story_c_04=GIORNO 5.##Non riesco a ricordare. Perche' sono venuto qui?##C'e' mai stato un motivo?##Credo che la morte si stia avvicinando costantemente. Le allucinazioni mi fanno male, Ho finito le provviste, e sto avendo violente palpitazioni cardiache.
story_c_05=GIORNO 7.##Non riesco a capire cosa sia vero e cosa no. I miei arti non si muovono come voglio. Mi sento come se stessi guadando in un fiume profondo che scorre sempre contro di me.##Ora mi sdariero' e lasciero' il fiume scorrermi addosso. Lasciero' che mi guidi fino alla foce.##Tanto so dove sto andando. Questo posto, Questo intero posto, e' solo una roccia urlante che gira in un regno vasto e infinito.##Andro' a riposare ora. Ti staro' attento.
em_a_01=Aha!##Ancora una volta ho ingannato la morte e procedero' a scappare da questi confini.##Sebbene il pensiero che la mia morte fosse romantica mi e' passato di mente, credo che la mia fuga lo sara' molto piu' profusamente.
em_a_02=Sono ancora pieno di vigore dopo la mia esperienza dell'altro giorno. La mia fame e sete sono entrambe scomparse, lasciandomi solo del distillato romanticismo.
em_a_03=Ora anche i mostri e gli altri esseri incorporei sembrano scoraggiati dall'attaccarmi. Sembrano notarmi ma non hanno piu' il fare imponente che avevano prima.##Chiaramente per via della mia determinazione romantica rinnovata!
em_a_04=Una strana bambina fantasma mi e' comparsa davanti con un atteggiamento piuttosto turbato e poco romantico. Sostiene che non sto facendo il mio lavoro e che dovrei segnalarlo immediatamente al mio comandante. Ho affermato con coraggio che non ho un comandante mentre vado alla deriva ovunque mi porti il vento mentre seguo il mio viaggio romantico. A questo punto lei si mostro' confusa e sprofondo' lentamente nel pavimento.
em_a_05=Sto cominciando a chiedermi perche' non ho avuto bisogno di nutrirmi in quelle che sembrano due settimane. All'inizio ho teorizzato che delle piccole particelle di cibo fossero emesse nell'aria.##Adesso realizzo che era un pensiero sciocco, visto che e' chiaro che mi sia stata regalata l'immortalita' in quanto artista romantico.
em_a_06=Ho notato qualcosa di strano oggi.##Il colore della mia pelle e' cambiato.##So che e' probabilmente normale visto che non vedo la luce del sole da tempo, ma per me e' stato uno shock. Ma so che il mio partner romantico e' li' fuori e si prendera' cura di me, a prescindere di quanto trasparente diventi la mia pelle.
em_a_07=La bambina fantasma e' tornata e mi sta fissando mentre scrivo. Insiste che io ho un lavoro qui e non lo sto svolgendo correttamente. Gli dico che qualsiasi lavoro lei pensa che io abbia non mi pare molto romantico. Sembra piu' arrabbiata ora e dice che se non la smetto mi togliera' il privilegio di scrive___
em_b_01=Mamma e Papa' mi amano davvero tanto!##Mi hanno detto che stanno facendo una festa per me!
em_b_02=Dov'e' Papa'? Mi ha detto che la festa sarebbe avvenuta qui.
em_b_03=Mamma mi ha dato un cesto di Biscoti. per la mia festa..##Ne ho mangiati un po'.
em_b_04=Perche' sento dei rumori? Mamma e Papa' mi seguono? Stiamo giocando?
em_b_05=Sono caduta in un buco.. La mia gamba fa molto male e ho pianto.
em_b_06=Mi sono addormentata. La mia gamba fa ancora male. Vedo Papa', e' tornato per me..##Non e' Papa'.
em_c_01=GIorno 1##Sono entrto in una casa fantasma spettrale. Non so quanro a lungo staro qui ma spero non trppo.
em_c_02=Giorno 2##Oggi ho visto proprio uno spettor. Ammettero' che era spaventoso ma non spaventoso quanto in alcuni giochi orror.
em_c_03=Giorno 3##Sto cominciando ad avere fame e sete. Ho portato tanto cibo oltre alla mia cagliata di formaggi##Spero che trovero piu' cibo presto.
em_c_04=Giorno 4##Ok sono stanco di questo posto. oggi un'uomo gelatinoso spaventoso mi ha attaccato (circa) e sono scappato iva.
em_c_05=Giorno 4##Speravo di avere il wifi qui. quello rimane la cosa piu spaventosa di questo potso. Non posso controllare i miei account online o postare i miei pensieri giornaglieri.##Mi sta facndo accumulare tensione.
em_c_06=Giorno 6##Quindi sono abbastanza moto ora. Non penso che posso e so che al mondo manchero, ma non preoccuparti modno. Sono comunque abbastanza hardcor per arrivare cosi a lungo suppongo ma era un viaggio spaventoso (piu o meno).
em_c_07=Giorno 7##Mentre sto per morire devo continuare comunque. Sto finendo cio che rimane della cagliata di formaggio e non trovo piu cibo. C'e qualcosa in fondo al corridoio credo. Si sta avvicinando. OH percheee. perche questo deve questo accadere a me?
em_d_01=Ok uh, sto scrivendo delle note. Penso sia la cosa giusta da fare in questa situazione. Stavo registrando la villa per il mio canale dedicato all'esplorazione urbana, ma penso di essermi intrappolato e la mia telecamera si e' scaricata ore fa.
em_d_02=Hey lettori, sta andando tutto bene per ora. Non posso tornare indietro visto che gli ascensori scendono e basta, ma dovranno pur fermarsi da qualche parte, giusto? Ho abbastanza cibo per un po' e la mia torcia a manovella funziona bene, quindi vedremo come va.
em_d_03=Hey amici, noto che ci sono queste sagome di cartone che spuntano dai muri. Immagino che questa fosse o e' un qualche tipo di giostra a tema. Continuo a scendere e scendere, ma non ho molta scelta.##Tutto sommato non e' cosi' male.
em_d_04=Quindi gente, tutto almeno e' decente. Il cibo e' quasi finito, l'acqua pure. Almeno le fondamenta di questo posto sembrano essere resistenti e non c'e' molta muffa nell'aria quindi non devo usare la maschera. Voglio comunque uscire da qui il prima possibile.
em_d_05=Beh lettori, ho trovato un'area simile a un giardino, o una serra. Era molto bella, ma non mi ha aiutato molto. Ho trovato una sorta di falce in un 'albero'. Normalmente non rubo dai posti che esploro, ma questo posto mi inquieta molto e voglio avere qualcosa per difendermi.
em_d_06=Ciao a tutti, quanto avrei voluto che la mia telecamera avesse ancora della batteria. Ho trovato alcune aree molto interessanti in questa villa. Una pareva una sorta di scuola e un'altra poteva essere qualche tipo di ristorante interno. Ho trovato della (carne) congelata li', ma non sono sicuro se dovrei mangiarla o meno.
em_d_07=Okay ragazzi, mi sono stancato di questo posto. Per quanto interessante possa essere, penso di star rischiando la mia vita qui. Non posso immaginare che continui ancora a lungo e sono sceso troppo in basso per risalire ora.
em_d_08=Beh lettori, penso di essere vicino ad un'uscita. Ho trovato un'altra area simile a una villa. Mi sento molto stanco, quindi penso che mi prendero' una pausa qui.
em_e_01=NOTA I##Caro Lettore,##Sono conosciuto come Jasper Midnight. Sembra che io sia intrappolato in una casa degli orrori, per cosi' dire. Mentre a prima vista pensavo che non fosse altro che una casa dei divertimenti con delle sagome spaventose e un'atmosfera irritante, in realta' e' durata molto piu' a lungo di quanto mi aspettassi.##Mi mettero' a scrivere queste note mentre viaggio per informare qualsiasi anima sfortunata dopo di me.##Cordiali saluti,##JM
em_e_02=NOTA II##Caro Lettore,##Oggi e' stato un giorno interessante. Ho trovato una creatura simile a un ragno o un millepiedi che mi seguiva. Fu un incontro glorioso ma alquanto insoddisfacente. Dopo solo qualche stanza ha smesso di seguirmi.##Cordiali saluti,##JM
em_e_03=NOTA III##Caro Lettore,##Questa dimora migliora di continuo. Oggi ho trovato una stanza con un'atmosfera deliziosamente ispirata ai manicomi abbandonati e arrugginiti. Dico 'ispirata' semplicemente perche' era troppo perfetta per essere reale. Ho anche trovato delle strane creature aggrappate sotto alle grate nel pavimento che si contorcevano in una danza sinistra.##Cordiali saluti,##JM
em_e_04=NOTA IV##Caro Lettore,##Hehehehehe##Amo questo posto. E' come un incubo senza la nebbia del sonno o un sogno ad occhi aperti che avresti mentre anneghi. Oggi ho trovato una creatura dietro a una finta foresta di terribili delizie. Si muove senza muoversi e parla attraverso un volto senza mandibola.##Cordiali saluti,##JM
em_e_05=NOTA V##Caro Lettore,##Questo e' stato un viaggio che mi ha cambiato la vita. Per molto tempo ho sentito questo vuoto che mi ha sia svuotato che sopraffatto. Ma ora ho un posto su questo mondo. Non sento piu' il freddo dentro di me ma invece un fuoco crescente.##Cordiali saluti,##JM
em_e_06=NOTA VI##Caro Lettore,##Il mondo e' un posacenere, costantemente in fiamme. E' pieno di difficolta', tumulti, felicita', e amore. Ed e' bellissimo nella sua interezza.##Cordiali saluti,##JM
em_e_07=NOTA VII##Caro Lettore,##La mia vita e' trascorsa, il mio fuoco spento. Il mio corpo trema ed espelle sangue. Non posso piu' andare avanti ma vorrei farlo. Continua dopo di me e guarda la bellezza del mondo. Osserva l'orrendo e il perfetto.##Cordiali saluti,##JM
em_f_01=Rapporto di Ricerca #153##Attraverso il portale dei ragni mi sono imbattuta in una pletora di nuovi design spaventosi per il Campione 1 oltre a dei nuovi metodi per reclutare soldati.##Nell'immersione di oggi ho scoperto un gruppo di ragnatele incentrate su brevi esperienze horror e su una sorta di cucina italiana. Continuero' a fare ricerce su questo ammasso di ragnatele.
em_f_02=Rapporto di Ricerca #154##L'immersione di oggi mi ha aiutato a creare un design per il Campione 1 che penso sara' piu' efficace. Sembra che questa creatura conosciuta come Jeff stia terrorizzando il mondo in superfice. Delle ricerche piu' approffondite su altre ragnatele mi hanno portato a credere che ci siano molteplici Jeff, Alcuni addirittura si incrociano con altri mostri. Inutile dire che la prole potrebbe rivelarsi interessante.
em_f_03=Rapporto di Ricerca #155##Oggi un'idiota lavoratore del GL labs ha pensato di dubitare del concept per il mio design. Ha sostenuto che qualunque creatura Jeff sia, decisamente non assomiglia al mio design. Ho risposto mostrandogli le pile su pile di immagini che lo ritraggono che possiedo e poi infilzandolo tra le costole con il mio coltello.
em_f_04=Rapporto di Ricerca #156##Il reclutamento procede a rilento e devo fare qualcosa al riguardo.##Con le ricerche fatte nell'immersione di oggi credo di avere una soluzione. Dobbiamo attirare una di quelle persone LP verso la casa. Dopo che verra' qui credo che altre persone LP e 'spettatori' si riverseranno in massa.
em_f_05=Rapporto di Ricerca #157##Ho iniziato il piano per attirare le persone LP verso la casa. Ho inviato centinaia di notifiche identiche a un paio di grandi persone LP. Fino ad ora la maggior parte non sono state viste, quindi oggi ho arruolato tutti gli schiavi del GL Lab per copiare il messaggio che ho scritto e pubblicarlo il piu' frequentemente possibile.
em_f_06=Rapporto di Ricerca #158##Oggi nel portale dei ragni abbiamo ricevuto alcune risposte alla nostra brochure per la casa. La maggior parte ha sostenuto che fossimo una sorta di carne in lattina, ma alcuni sembravano ottimisti. Ora sto chiudendo la campagna pubblicitaria per concentrare tutti i nostri lavoratori nel rafforzare le strategie di reclutamento.
em_f_07=Rapporto di Ricerca #159##Beh questa mattina, o sera, o pomeriggio, non posso esserne certa qua giu', un lavoratore del GL Labs mi ha dato delle notizie alquanto dolorose riguardo al titolo della casa. Sembrerebbe che un'altra casa piu' distante abbia in qualche modo il nostro titolo e vuole che noi cambiamo il nostro. Devono avere un'armata di fantasmi piu' grande della nostra, quindi serve investigare piu' a fondo.
em_f_08=Rapporto di Ricerca #160##Oggi il lavoratore ha detto che con abbastanza fondi possiamo respingere questa metamorfosi del titolo, ma ho deciso di tenermi tutti i fondi per il sostentamento con i noodles secchi e per cose spaventose. Non sono sicura di come quest'altra villa otterra' benefici da questa cosa. Comunque, tutte le altre notizie sono buone e la prossima ondata di mostri e' praticamente pronta.

