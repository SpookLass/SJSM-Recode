[SET_DESC]
fov=Il FOV verticale della visuale.
dynamic_fov=Il FOV dipende dalla velocita' del giocatore.
fps=Frame al secondo.
fps_update=Quanto spesso viene mostrato il framerate.
tps=Tick al secondo.
sens=Sensibilità della visuale.
vol=Volume di tutti i suoni.
mus_vol=Volume della musica e dell'ambiente.
mon_vol=Volume dei suoni specifici ai mostri.
sfx_vol=Volume degli effetti sonori.
voice_vol=Volume del doppiaggio. Non si applica ai mostri.
reduce_flash=Riduce le luci lampeggianti.
lang=Lingua del testo.
crouch_toggle=Puoi restare abbassato senza tenere premuto.
max_part=Numero massimo di particelle 3D che possono venire generate alla volta.
vsync=Sincronizzazione verticale. Rimuove eventuali tagli sullo schermo.
anti_alias=Anti alias. Smussa le texture, ma non ha effetto sullo schermo.
sub=Sottotitoli per doppiaggi e mostri. Gli effetti sonori non hanno sottotitoli a meno che non selezioni "tutti".
fullscreen=Schermo intero.
color=Come vengono colorate le stanze. Selezionando stanza, solo i muri, i pavimenti e i soffitti sono affetti dal colore delle stanze.
coll_prec=Collisioni precise. Se spenta, il gioco potrebbe girare piu' fluidamente, ma con piu' probabilita' di imbattersi in bug.
move_bob=Quanto si muove la telecamera mentre ti muovi.
idle_bob=Quanto si muove la telecamera quando ferma.
shake_type=Come viene scosso lo schermo. Classica modifica solo la posizione della telecamera, mentre moderna modifica solo l'angolo di essa.
mem_save=Riduce il peso sulla memoria. Disattiva principalmente gli sprite direzionali del Killer.
mon_hud=Mostra i mostri che ti stanno seguendo nell'angolo in basso a sinistra. Selezionando durata, verra' anche mostrato quante stanze mancano prima di seminarli.
rm_hud=Mostra il nome della stanza in alto a destra, sotto al contatore delle stanze.
bar_hud=Mostra vita e stamina in percentuale sopra le barre. Selezionando classica, le barre scompariranno completamente per dare un'esperienza piu' simile alla versione 1.2 del gioco.
tps_hud=Mostra in tempo reale gli FPS e i TPS in alto a sinistra. Utile se giochi a schermo intero.
time_hud=Mostra il cronometraggio del salvataggio attuale in alto a destra.
name=Quali nomi utilizzare per i mostri. Originale prende i nomi dal codice, Rinnovazione prende i nomi dagli sviluppatori della versione Rinnovata HD, e fandom prende i nomi dalla wiki del gioco.
res_w=Larghezza dello schermo.
res_h=Altezza dello schermo.
back=Torna al menu precedente.
apply=Applica le impostazioni. (NON PUOI TORNARE INDIETRO)
reset=Ripristina le impostazioni. (NON PUOI TORNARE INDIETRO)
invert_yaw=Inverte il movimento orizzontale della telecamera.
invert_pitch=Inverte il movimento verticale della telecamera.
killer_voice=Seleziona la voce per @n
killer_voice_og=Doppiato da Vernon Shaw. Vernon e' diventato una figura controversa per via del suo coinvolgimento con Game Grumps e, in particolare, il gioco Dream Daddy. Non condoniamo le sue azioni, questa opzione è presente puramente per motivi di archiviazione.
killer_voice_hd=Doppiato da DirectorFlik.
killer_voice_mod=Doppiato da Spook Lass.
killer_voice_ryan=Doppiato da Ryan J.
reset_spd=Ripristina il moltiplicatore della velocita' del gioco nel caso di alcuni avvenimento. Locale include la manifestazione dei mostri e i locali.
rand_theme=Musica casuale quando compaiono i mostri, includendo l'assenza totale di una musica di inseguimento.
wake_3d=I suoni di risveglio dei mostri sono attenuati, salvo White Face.
amb_3d=I suoni ambientali sono attenuati.
gameplay=Impostazioni di gameplay.
visual=Impostazioni grafiche.
audio=Impostazioni audio.
performance=Impostazioni di prestazioni.
access=Impostazioni di accessibilita'.
input=Impostazioni di input.
hud=Impostazioni dell'interfaccia.
control=Impostazioni dei controlli.
input=Impostazioni di input.
preset_load=Carica un preset. (NON PUOI TORNARE INDIETRO)
joy_id=ID del controller, da 0 a 7.
joy_sens=Sensibilita' del controller. 0 provocherà movimento anche se la levetta e' leggermente spostata, 100 non permette movimento.
input_cam=Tipo di controllo della telecamera. Selezionando il D-Pad sia per il movimento che per la telecamera attivera' i tank control.
input_move=Tipo di controllo del movimento. Selezionando il D-Pad sia per il movimento che per la telecamera attivera' i tank control.
input_menu=Tipo di controllo per il menu. Usato anche per i controlli 2D.
up_input=Input su per il menu.
down_input=Input giu' per il menu.
left_input=Input sinistro per il menu.
right_input=Input destro per il menu.
confirm_input=Input di conferma per il menu.
back_input=Input di ritorno per il menu.
forward_input=Input di movimento in avanti.
backward_input=Input di movimento indietro.
strafe_left_input=Input di movimento a sinistra.
strafe_right_input=Input di movimento a destra.
interact_input=Input di interazione.
sprint_input=Input per correre.
jump_input=Input per saltare.
crouch_input=Input per abbassarsi.
attack_input=Input di attacco.
pause_input=Input di pausa.
debug_input=Input di debug.
turnaround_input=Input per girarsi.
ff_input=Input per velocizzare il gioco.
slow_input=Input per rallentare il gioco.
cam_up_input=Input per muovere la telecamera verso l'alto.
cam_down_input=Input per muovere la telecamera verso il basso.
cam_left_input=Input per muovere la telecamera verso sinistra.
cam_right_input=Input per muovere la telecamera verso destra.
fullscreen_input=Input per attivare e disattivare il fullscreen.
screenshot_input=Input per fare uno screenshot.
player=Il giocatore attuale su cui modificare le impostazioni.
load_preset=Carica un preset di controlli. Personalizzato carica da un file.
save_preset=Salva un preset di controlli come file.
pitch_bend=I suoni dei mostri hanno un tono casuale.
pause_theme=Il menu di pausa ha la sua musica.
theme=Quali musiche dovrebbero esserci durante un inseguimento.
theme_rand=Sceglie una musica casuale.
theme_def=Sceglie la musica corrispondente all'impostazione base.
theme_main=I mostri senza musica originale avranno musica nuova.
theme_old=Verranno scelte le tracce di inseguimento più vecchie.
theme_rom=Verranno usate le tracce di Rom M dove applicabile.
doppler=I suoni emessi nello spazio 3D avranno un effetto doppler.
pride=Le stanze hanno una rara probabilita' di prendere l'aspetto di varie bandiere della comunita' LGBT. Trans limita le bandiere a quella trans e simili.
halloween=Le stanze hanno una rara probabilita' di essere arancioni, verdi, o viola. I cartonati del campione 1 hanno una probabilita' piu' alta di avere l'aspetto di zucche e mais candito.
easter=Possibilita' che i cartonati del campione 1 prendano un aspetto a tema pasqua.
fun=Impostazioni aggiuntive che non hanno effetto sul gameplay.
