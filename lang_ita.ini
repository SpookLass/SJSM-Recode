js=Tipo: Docile@lFatalita' Totali: 4@lMetodo: Infarto##Una sagoma di cartone che salta fuori dai muri. Provato non molto efficace contro soggetti in salute.
gel=Tipo: Attivo@lFatalita' Totali: 137@lMetodo: Lacerazioni Fisiche##Uno spettro perlopiu' semisolido che cambia stato di materia di continuo. Provato molto efficace contro soggetti lenti o deboli.
bug=Tipo: Attivo / In Testing@lFatalita' Totali: 43@lMetodo: Morsi Infettivi##Un campione di test sviluppato al GL Labs. Dovrebbe rivelarsi utile quando rilasciato. Varie prove dimostrano che e' adeguatamente efficace contro soggetti medi.
bab=Tipo: Attivo@lFatalita' Totali: 168?@lMetodo: Sconosciuto##Una creatura trovata nella chiesa di una piccola citta'.  I soggetti sono persi dopo il contatto con il campione. Il metodo attuale di uccisione e' sconosciuto. Provato estremamente efficace contro soggetti con problemi mentali o poca forza di volonta'.
pup=Tipo: Attivo@lFatalita' Totali: 189@lMetodo: Punture Fisiche##Una marionetta a dimensioni naturali in legno ritrovata a galleggiare in un bacino idrico dove una volta stava un villaggio. Il campione e' attivo nonostante le apparenze e si e' rivelato molto efficace contro soggetti che lo ignorano o hanno problemi alla vista.
flesh=Tipo: Sconosciuto@lFatalita' Totali: 93@lMetodo: Sconosciuto##Il campione cambia costantemente forma e attributi in base alla personalita' del soggetto, ma la forma piu' comune assomiglia a un muro di disegni anatomici. Efficace solo su soggetti con traumi passati o dei precedenti di problemi psicologici.
dl=Tipo: Attivo@lFatalita' Totali: 149@lMetodo: Assorbimento##Una figura fluttuante che si e' manifestata in una camera di test qualche anno dopo che e' stata riempita di cio' che sembravano solo dei cervi insolitamente violenti. Il campione sembra inglobare i soggetti e assorbirli nella regione del torso. Provato estremamente efficace su soggetti violenti.
taker=Tipo: Sterminato@lFatalita' Totali: 362@lMetodo: Sconosciuto##Un piccolo cranio umano fatto in argilla che sembra aver preso sempre piu' massa attraverso i soggetti PRESI PRESI PRESI PRESI PRESI PRESI@l..................................@lIl campione e' stato considerato troppo difficile da contenere ed e' stato ucciso e smantellato dal GL Labs.
