body=Vincolato dal rigor mortis, sigillato in un velo di plastica,@lUn cadavere sogna tra terreno e nuvola,@lSteso sul freddo pavimento, desideroso ancora,@lDi un prestito d'aria, una volonta' vacante,@lDentro il suo guscio, una fantasia si risveglia,@lPer sangue che canta e carne da prendere,@lIndossando la loro faccia, rubando il loro nome,@lQuindi vivendo di nuovo, attraverso una cornice rubata.
