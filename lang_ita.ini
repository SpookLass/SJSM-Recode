[DESC]
back=Torna al menu precedente.
type=Modifica i comportamenti di mostri e particolari specifici.
story=Supera 1000 stanze di tenero terrore! (IN FUTURO)
endless=Esplora la dimora infinita e scopri orrori sconosciuti!
sandbox=Gioca con la modalita' debug! (IN FUTURO)
recode=Il comportamento base di Recode. I mostri sono piu' bilanciati per le combo, e cercano di rappresentare sia le controparti OG che quelle HD.
og=Il gioco originale. I mostri tendono a essere piu' basilari e meno bilanciati. Nonostante l'aspirazione ad essere perfettamente accurati, ci sono leggere differenze dai comportamenti originali, principalmente bug sistemati. Per via della casualita' del gioco, non e' sempre garantita la sopravvivenza.
hd=La rinnovazione HD del gioco. I mostri tendono ad essere piu' complessi e meno bilanciati. Nonostante l'aspirazione ad essere perfettamente accurati, ci sono leggere differenze dai comportamenti della versione HD, principalmente l'aspetto estetico. Per via della casualita' del gioco, non e' sempre garantita la sopravvivenza.
easiest=Nessuno ti insegue. Tutte le porte sono aperte.
easy=Solo un campione alla volta con oltre 20 stanze di spazio tra gli inseguimenti. Puoi imbatterti in porte bloccate solo quando sei da solo/a.
normal=Inseguimenti di gruppo rari, con quantita' variabili di stanze in mezzo.
hard=Inseguimenti di gruppo comuni, con poche stanze tra gli inseguimenti. La stamina e' persistente.
hardest=Inseguimento di gruppo continuo!
evil=Comportamenti casuali, porte bloccate, cadere nei fossi, e qualsiasi altra cosa dalla modalita' Estrema. Lasciate ogni speranza, voi che entrate.
crouch=Il giocatore puo' abbassarsi a comando.
jump=Il giocatore puo' saltare a comando.
stam_per=La stamina del giocatore persiste tra le stanze.
fall=Il giocatore puo' cadere dai bordi.
lock=Come vengono trattate le stanze chiuse a chiave.
dmg_shake=La visuale si sposta quando prendi danno.
mult_type=Come vengono trattati gli inseguimenti di gruppo. Minimo e' sempre al valore minimo, massimo e' sempre al valore massimo, e sottile affusola i valori tra l'inizio e la fine dell'inseguimento.
mult_min=Numero minimo di campioni che possono inseguire.
mult_max=Numero massimo di campioni che possono inseguire.
mult_start=Quando inzia ad affusolarsi l'inseguimento di gruppo se sottile e' selezionato.
mult_end=Quando smette di affusolarsi l'inseguimento di gruppo se sottile e' selezionato.
count_type=Come viene gestito il numero di stanze tra gli inseguimenti. Minimo e' sempre al valore minimo, massimo e' sempre al valore massimo, casuale e' un intervallo a caso tra i due valori, e sottile affusola i valori tra l'inizio e la fine della pausa.
count_min=Numero minimo di stanze tra gli inseguimenti.
count_max=Numero massimo di stanze tra gli inseguimenti.
count_start=Quando inizia ad affusolarsi la pausa se sottile e' selezionato.
count_end=Quando smette di affusolarsi la pausa se sottile e' selezionato.
dupe=I mostri possono seguirti insieme a copie di se stessi. Se canon e' selezionato, solo alcuni mostri potranno, in base al contesto del loro personaggio.
mon_chance=Quanto spesso i mostri seguono. La probabilita' e' uno sul valore specificato.
mon_chance_mult=Quanto la probabilita' viene moltiplicata dal numero di mostri. La probabilita' e' uno sulla somma tra il valore base e il prodotto tra il moltiplicatore e il numero di mostri presenti.
js_chance=Quanto spesso accadono i jumpscare.
ele_type=Quanti tassi di ascensori diversi ci sono.
ele_end_01=Quando il tasso di ascensore uno passa al tasso di ascensore due se il tipo di ascensore e' impostato ad almeno uno.
ele_end_02=Quando il tasso di ascensore due passa al tasso di ascensore tre se il tipo di ascensore e' impostato a due.
ele_rate_01=Quanto spesso compaiono gli ascensori prima del fine ascensore 1.
ele_rate_02=Quanto spesso compaiono gli ascensori dopo il fine ascensore 1 e prima del fine ascensore due se il tipo di ascensore e' impostato ad almeno uno.
ele_rate_03=Quanto spesso compaiono gli ascensori dopo il fine ascensore 2 se il tipo di ascensore e' impostato a due.
rare_chance=Quanto spesso compaiono le stanze rare se il giocatore non e' inseguito.
spec_list=Quali campioni della modalita' storia possono seguirti. Storia esclude i campioni scartati. Infinita originale esclude la carne, la sirena, e i campioni scartati. Beta rimpiazza i campioni usati con le controparti scartate. No Ringu esclude Ringu, permettendoti di giocare con solo la sua versione M.I..
mon_list=Quali mostri dell'Ospedale Karamari possono seguirti. Non cambia nulla se non hai il DLC installato. Rinnovo HD esclude la guardia di sicurezza. Originale esclude la guardia di sicurezza e il cadavere.
doll_list=Quali bambole della casa delle bambole possono seguirti. Rinnovo HD esclude Frenzy.
endless_list=Quali campioni della modalita' infinita possono seguirti.
unknown_list=Quali campioni sconosciuti possono seguirti.
locale=I locali, ovvero le stanze introduttive di ogni mostro, saranno presenti. (IN FUTURO)
permadeath=Il salvataggio viene cancellato alla morte.
one_shot=I giocatori moriranno in un colpo, per una sfida piu' impegnativa.
player=Tu, il giocatore.
player_recode=Accelera e si muove alla stessa velocita' in tutte le direzioni.
player_og=Accelera e si muove piu' lentamente quando non si muove in avanti.
player_hd=Non accelera e si muove alla stessa velocita' in tutte le direzioni, pero' con un passo decisamente piu' lento.
axe=L'ascia.
axe_recode=Puo' attaccare istantaneamente.
axe_og=Puo' attaccare istantaneamente.
axe_hd=Consuma 10 punti stamina per essere alzata e ha un leggero ritardo prima di colpire.
js=La tavola di cartone
js_recode=Ha un'animazione rapida e ferma il giocatore se non inseguito.
js_og=Non e' animata e ferma il giocatore a prescindere.
js_hd=E' animata e ferma il giocatore a prescindere.
js_alt=E' animata e scatta la visuale del giocatore verso se stessa.
gel=Lo spettro gelatinoso che genera pozze di melma.
gel_recode=Fluttua in aria ed esce dalle pozze.
gel_og=Passa attraverso i muri.
gel_hd=Fluttua, esce dalle pozze, si muove piu' veloce, e ha un ritardo di attacco.
brain=Il rancoroso campione scartato.
brain_recode=Insulta il giocatore e prevede i suoi movimenti in modalita' infinita.
brain_og=Quasi garantito che uccida il giocatore una volta rilasciato.
brain_hd=Quasi garantito che uccida il giocatore una volta rilasciato.
bug=L'ibrido tra ragno e centipede che si rintana nel soffitto.
bug_recode=Garantito che esca dalle buche. Accelera rapidamente.
bug_og=Ha una probabilita' di uscire dalle buche e si muove lentamente.
bug_hd=Garantito che esca dalle buche. Accelera rapidamente.
bug_rogue=Dalla mod Gone Rogue. Accelera linearmente, diventando molto pericoloso.
ringu=Lo spirito del XIV secolo che attraversa i muri.
ringu_recode=Ha una sagoma per vederla attraverso i muri.
ringu_og=Nessuna differenza notabile.
ringu_hd=Nessuna differenza notabile.
ringu_old=Abbandonata nel codice della versione HD Rinnovata. Molto piu' veloce del normale.
bab=La creatura di chiesa che ti distorce la mente.
bab_recode=Lascia una traccia di sagome ed emette strani rumori ambientali. Puo' essere spinta dall'ascia. Le allucinazioni ignorano le porte. 
bab_og=Molto lenta in Modalita' Storia. Le allucinazioni hanno effetto sulle porte.
bab_hd=Lascia una traccia di sagome. Le allucinazioni ignorano le porte.
bab_old=Dalle primissime versioni del gioco originale. Non emette allucinazioni, si muove molto lentamente, e a volte ferma il giocatore o gli drena la stamina.
pup=Il mercante di marionette che si muove solo se inosservato.
pup_recode=Viene tirato in alto quando non guardato. Puo' resistere all'ascia.
pup_og=Attraversa i muri e puo' resistere all'ascia.
pup_hd=Cerca di attaccare il giocatore se osservato troppo a lungo, fallendo se quest'ultimo si muove all'indietro.
pup_old=Da una versione precedente del gioco originale. Compare piu' velocemente e non si teletrasporta.
pup_dh=Dalla versione originale della porta degli inferi nella Casa delle Bambole. Compare piu' velocemente e si puo' rialzare.
pup_dh_hd=Dalla versione rinnovata della porta degli inferi nella Casa delle Bambole. Compare piu' velocemente e si puo' rialzare.
flesh=Il muro di simboli anatomici in movimento.
flesh_recode=Bilanciato per garantire che il giocatore possa raggiungere l'uscita senza venire intercettato. Drena la vita se in contatto e piazza delle frecce a terra per guidare il giocatore.
flesh_og=Nessuna differenza notabile.
flesh_hd=Si muove molto piu' lentamente del normale.
flesh_alt=Basato sulla variante Recode. Non forza piu' le sue stanze, inseguendo ovunque.
dl=Il signore dei cervi che riduce i livelli del ferro nel sangue del giocatore.
dl_recode=Fluttua, supera i muri e puo' essere stordito dall'ascia.
dl_og=Passa attraverso i muri.
dl_hd=Fluttua e supera i muri.
dl_old=Dal codice della rinnovazione HD. Entra piu' tardi nella stanza e ha una distanza di superamento piu' generosa.
dl_rogue=Diventa piu' veloce piu' ti allontani.
dl_remodeled=Dalla mod Remodeled. Accelera quando inosservato, ma diventa incredibilmente veloce quando osservato troppo a lungo.
taker=Il cranio di argilla rossa che PORTA IL MORTO.
taker_recode=Si manifesta dopo due minuti e ti uccide istantaneamente.
taker_og=Si manifesta dopo due minuti.
taker_hd=Si manifesta dopo un minuti e ti uccide istantaneamente.
taker_dh=Si manifesta dopo 46 secondi, si muove rapidamentee ti uccide istantaneamente.
eel=L'ibrido tra un verme e un'anguilla che e' stato rimpiazzato.
eel_recode=Si muove piu' velocemente, ma e' vulnerabile all'ascia.
eel_og=Nessuna differenza notabile.
eel_hd=Nessuna differenza notabile.
eel_remodeled=Dalla mod Remodeled. Si muove molto rapidamente e non puo' essere fermato.
para=Il parassita che ti impone di andare piano per andare sano e lontano.
para_recode=Non torna mai alla forma originale, ma e' molto piu' lento e accelera.
para_og=Torna alla forma originale ogni stanza.
para_hd=Torna alla forma originale dopo aver attaccato il giocatore. La sanguisuga accelera.
para_old=Dalle prime versioni del gioco originale. Si trasforma molto piu' raramente, ci mette piu' tempo a entrare, e si muove molto piu' lentamente quando in forma sanguisuga.
fd=Il demone di carne che nasconde le porte.
fd_recode=Il testo di interfaccia per aprire le porte viene nascosto insieme ad esse. Si muove molto piu' in fretta quando guardato, ha una sagoma, e una fiamma sopra la testa.
fd_og=Si muove molto piu' in fretta quando guardato.
fd_hd=Ha una fiamma sopra la testa.
fd_dh=Teorica versione originale della porta dell'inferno della Casa delle Bambole. Funziona come l'originale, ma fa comparire carne macellata.
fd_dh_hd=Dalla versione HD della porta dell'inferno della Casa delle Bambole. Fa comparire carne macellata.
killer=L'uomo posseduto da una villa.
killer_recode=Scatta, ma non accelera.
killer_og=Si muove molto lentamente.
killer_hd=Scatta e accelera.
killer_old=Dai file della rinnovazione HD. Piu' lento quando cammina, piu' veloce quando corre.
killer_remodeled=Dalla mod Remodeled. Scatta piu' a lungo, e continua a correre tra una stanza e l'altra.
killer_rogue=Dalla mod Gone Rogue. Scatta e accelera linearmente.
killer_alt_01=Aspetta molto prima di entrare, poi scatta verso il giocatore ad alta velocita', riprendendo il normale comportamento quando colpisce il giocatore.
killer_alt_02=Giocatore 9. Ha praticamente le stesse statistiche di un giocatore, diventando un nemico formidabile.
mur=La sirena che si nasconde sott'acqua.
mur_recode=(IN FUTURO)
mur_og=(IN FUTURO)
mur_hd=(IN FUTURO)
sg=La guardia di sicurezza che compare da qualche parte nella stanza.
sg_recode=Scatta verso il giocatore quando troppo vicino.
sg_og=Scatta verso il giocatore quando troppo vicino. La dimensione della hitbox lo rende veramente sleale.
sg_hd=Gira casualmente finche' non avvicinato. La dimensione della hitbox lo rende veramente sleale. Drena la stamina invece della vita
sg_kh=Gira casualmente finche' non avvicinato. La dimensione della hitbox lo rende veramente sleale.
body=Il cadavere scappato dall'obitorio.
body_recode=Da al giocatore stamina infinita, ma per compensare si muove molto piu' velocemente. Ritorna al punto di partenza dopo aver attaccato.
body_og=Da al giocatore stamina infinita e crea effetti stroboscopici.
body_hd=Accelera rapidamente e torna al punto di partenza dopo aver attaccato.
body_old=Dalle vecchie versioni della rinnovazione HD. Fluttua.
body_kh=Dalla rinnovazione HD dell'Ospedale Karamari. Da stamina infinita e non torna al punto di partenza dopo aver attaccato.
body_alt=Basato sulla mod Remodeled. SPEEN!
stem=La testa di bambino ingabbiata.
stem_recode=Accelera in modo piu' naturale e si teletrasporta quando attaccato.
stem_og=Accelera linearmente e non puo' essere attaccato.
stem_hd=Ottiene un boost casuale, ma non può muoversi se non e' girato verso il giocatore. Si teletrasporta quando attaccato.
stem_kh=Dalla versione originale dell'Ospedale Karamari. Fa leggermente piu' danno, si muove piu' lentamente.
stem_kh_hd=Dalla rinnovazione HD dell'Ospedale Karamari. Si muove piu' lentamente e non puo' essere attaccato.
stem_old=Dal codice della rinnovazione HD. Si manifesta dopo un leggero ritardo.
stem_alt=Basato sulla variante Recode, ma ha il boost della variante HD. Questa combinazione gli permette di slittare ovunque.
patient=Il paziente impiccato che ha una relazione molto complicata con il contatto visivo.
patient_recode=Accelera mentre guardato. Si muove rapidamente mentre non guardato. Fluttua.
patient_og=Si muove lentamente mentre guardato e infine si teletrasporta. Si muove rapidamente mentre inosservato.
patient_hd=Accelera mentre guardato e infine si teletrasporta. Si teletrasporta sul giocatore se inosservato troppo a lungo.
patient_alt=Esteticamente simile alla versione HD, si comporta come la versione originale.
patient_kh_hd=Dalla versione HD dell'Ospedale Karamari. Non può essere attaccato
gc=La mucca pazza che trasforma cio' che la circonda.
gc_recode=Si sposta rapidamente quando guardata, con un campo visivo generosamente piccolo. Crea una nebbia densa intorno al giocatore e riduce il FOV.
gc_og=Si sposta rapidamente quando guardata. Riduce la distanza di rendering e il FOV.
gc_hd=Fluttua ed e' vulnerabile all'ascia.
gc_kh=Dalla versione originale dell'Ospedale Karamari. Si teletrasporta in avanti rapidamente piuttosto di muoversi. Non ha effetti a schermo.
gc_kh_hd=Dalla rinnovazione HD dell'Ospedale Karamari. Invulnerabile all'ascia. Non ha effetti a schermo.
gc_alt=Mucca. Semplicemente la variante HD ma capovolta.
gc_kh_recode=Accelera rapidamente ma torna al punto di partenza quando attaccata.
bekka=La donna del venerdi'.
bekka_recode=Appare brevemente alla porta di uscita ogni due stanze.
bekka_og=Rende le stanze estremamente buie.
bekka_hd=Ha una probabilita' casuale di comparire alla porta di uscita per 3 secondi.
bekka_remodeled=Dalla mod Remodeled. Puo' comparire all'uscita o all'entrata. Una volta scomparsa, rende gradualmente la schermata buia e fa danno rapido.
bekka_rogue=Si manifesta occasionalmente dove il giocatore sta guardando.
bekka_alt=Come la variante Recode, ma non scompare dalla porta di uscita.
husk=Il gruppo di bambole possedute.
husk_recode=(IN FUTURO)
husk_og=(IN FUTURO)
husk_hd=(IN FUTURO)
wc=La lunga bambola viscida.
wc_recode=Si muove piu' velocemente e fa piu' danno.
wc_og=Si muove piu' lentamente e ha piu' vita.
wc_hd=Gira per la stanza finché non vede il giocatore e accelera.
wc_remodeled=Dalla mod Remodeled. Si muove molto piu' velocemente e fa molto piu' danno.
clown=Il pagliaccio.
clown_recode=Nessuna differenza notabile.
clown_og=Nessuna differenza notabile.
clown_hd=Nessuna differenza notabile.
clown_alt=Fa danno.
hk=La bambola riempita di uncini che attacca quando osservata.
hk_recode=Rende le stanze piu' rosee, aggiunge lampadine, ed e' piu' vulnerabile all'ascia.
hk_og=Nessuna differenza notabile.
hk_hd=Nessuna differenza notabile.
hk_rogue=Accelera quando guardata a lungo, rende le stanze piu' rosee, e aggiunge le lampadine.
frenzy=Lo spirito vendicativo che attacca inaspettatamente.
frenzy_recode=Applica un effetto bianco e nero ortocromatico, torna al punto di partenza quando ti colpisce, e diventa impaziente se evitata a lungo.
frenzy_og=Nessuna differenza notabile.
frenzy_hd=Nessuna differenza notabile.
real_ringu=Il nuovo e migliorato spirito del XIV secolo con uno statico che ti blocca la visuale.
real_ringu_recode=Ha una sagoma e applica lo statico sulla nebbia. Quando osservata, rallenta nella prima forma, ma accelera nella seconda.
real_ringu_og=Sovrappone lo statico allo schermo. La seconda forma e' piu' veloce quando inosservata.
real_ringu_hd=Applica lo statico sulla nebbia. Piu' veloce del normale.
real_ringu_old=Dal codice della rinnovazione HD. Molto piu' veloce del normale.
tiri=Lo spirito della foresta che blocca il percorso con ombre.
tiri_recode=Viene stordita dopo averti attaccato. Le stanze e la nebbia sono colorate di blu chiaro.
tiri_og=Si muove all'indietro dopo averti attaccato. Le ombre sostengono 3 colpi. Le stanze e la nebbia sono colorate di un azzurro molto acceso.
tiri_hd=Le stanze sono blu chiaro.
tiri_old=Dal codice della rinnovazione HD. Si muove molto piu' veloce del normale.
lisa=Il corpo in decomposizione di una donna che ripete le stanze e si muove quando inosservata.
lisa_recode=Diventa visibile quando inosservata e torna al punto di partenza dopo aver attaccato. Congela il contatore delle stanze piuttosto di ripetere la stanza.
lisa_og=Diventa visibile quando inosservata, fluttua e passa attraverso i muri, e si teletrasporta all'indietro dopo aver attaccato.
lisa_hd=Diventa visibile e torna al punto di partenza dopo aver attaccato.
lisa_alt=Basata sulla variante Recode. Non ripete la stanza.
otto=La lontra animatronica.
otto_recode=Gli occhi si illuminano al buio.
otto_og=Nessuna differenza notabile.
otto_hd=Gli occhi si illuminano al buio e ha un leggero boost di velocita'.
otto_old=Dal codice della rinnovazione HD. Fa decisamente piu' danno.
spooper=Il parassita di spore che drena la vita.
spooper_recode=Vomiti solo quando attaccato dall'allucinazione. Il drenaggio della vita non ti uccide.
spooper_og=Vomiti in momenti casuali.
spooper_hd=Vomiti in momenti casuali se e' l'unico a seguirti. Il drenaggio della vita e' piu' lento.
wf=Il fantasma digitale.
wf_recode=Si sposta rapidamente quando guardato, con un campo visivo generosamente piccolo. Si teletrasporta quando il giocatore e' troppo distante. Congela il contatore delle stanze piuttosto di ripetere la stanza.
wf_og=Si sposta rapidamente quando guardato e puo' comparire alla porta di uscita. Si teletrasporta quando il giocatore e' troppo distante.
wf_hd=Accelera nel tempo quando guardato. Si teletrasporta quando il giocatore e' troppo distante o se osservato a lungo.
wf_old=Dal codice originale. Inizia veloce e rallenta se guardato. Si arrabbia se osservato troppo a lungo.
wf_old_hd=Dal codice della rinnovazione HD. Fa incredibilmente piu' danno.
wf_imscared=Dal codice di IMSCARED. Si teletrasporta con un timer.
wf_alt=Si muove in senso orario attorno al giocatore quando guardato. Si teletrasporta quando il giocatore e' troppo distante.
wf_imscared_recode=Si teletrasporta con un timer, ma scompare per meno tempo.
howard=Il jumpscare strano.
howard_recode=La porta progredisce andando avanti per il loop, e mostra il suo progresso.
howard_og=La porta progredisce interagendoci.
howard_hd=La porta progredisce andando avanti per il loop e interagendo con la nota.
spec=I nemici della Modalita' Storia.
mon=I nemici dell'Ospedale Karamari.
doll=I nemici della Casa delle Bambole di Spooky.
es=Le versioni della Modalita' Infinita dei nemici della Modalita' Storia.
unknown=I nemici della Modalita' Infinita.
toggle=Impostazioni commutabili.
chase=Impostazioni di inseguimento.
rm=Impostazioni delle stanze.
rand=Comportamenti casuali.
off=Impostazione disattivata.
load_preset=Carica preset personalizzato.
save_preset=Salva preset personalizzato.

