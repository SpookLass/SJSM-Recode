js=DESCRIPTION##It is the first specimen encountered in the mansion, only jumpscaring the player when encountered.##APPEARANCE##It takes the form of cardboard painted with various designs by Spooky. Most of their designs are cutesy, but some have been painted with more twisted faces. Although not visible before activating, it lays flat against the wall until the player approaches. The story mode designs are as follows; A green slime, a blue ghost, a skeleton, a purple spider with blue spots, a jack-o-lantern, a stump, a lumpy space thing, a coffee cup, a notably unhappy piece of toast, an ice cream cone with eyelashes, a realistic skull, and a green slime with a scary face painted on. The endless mode designs are as follows; An eggplant, a donut, a tooth, a bar of soap, a lollipop, a sticky note with to-do written on it, a moose, a potato, an unenthused bucket, a cake, a boot, a green slime cat, a piece of candy corn, a creepypasta, the Scream painting, a xenomorph, a horrifying face, a slightly less horrifying face, and a toaster tart. Lisa also has a variant, being a faded version of the green slime. Karamari adds one final variant, Peter the Pepper for the Original, and a soda can for the HD Renovation.##GAMEPLAY##It pops out of the wall when the player gets close, stunning the player if another monster isn't present. It occasionally shows up with a note on it. It can be cut down with the axe, adding 1 violence. During Lisa's chase, it becomes silent, and always has one of her notes on it.##ORIGINAL##It lacks any animation, and stops the player regardless of if another monster is present. Although not present in Recode, the time it activates in the orignal is wildly inconsistent since the trigger is not tied to its position##RENOVATION##Its sound is attenuated, and doesn't stop. It also stops the player regardless of if another monster is present.##ALTERNATE##Its alternate behavior forces the player to look at it.##TRIVIA##Its cutesy face highly resembles the art style of Adventure Time.##Several of the designs are references to other franchises, most notably Lumpy Space Princess from Adventure Time, a combination of Eyeless Jack and Jeff the Killer from their respective Creepypastas, and a Xenomorph from Aliens.##There is an unused cardboard resembling a salt shaker shown in one of Kira's videos. https://www.youtube.com/watch?v=nbkrdKEZgSA##The Fandom Wiki has a cardboard resembling a flashlight, although it is unknown where it originates or who made it.##Before the rework of their behavior in the endless update of the Original, only 7 cardboard variants were meant to show up before room 700.##According to Sheena, the pumpkin cutout is not named Sam. https://discord.com/channels/370599354836451328/374346957218381826/7685601576381317622##Peter the Pepper cannot be harmed.##It is the only specimen to appear in every game mode, being constantly preset in Story and Endless Mode, appearing at the start of Karamari Hospital, and appearing during the escape sequence in Dollhouse.##It dealing damage was considered during development, but ultimately scrapped. No remnant remains of it in the code. https://www.youtube.com/watch?v=2MfmP49--JU&t=153s##One of its sounds is shared with Howard and Specimen 12.
gel=DESCRIPTION##A semisolid spectre that uses its puddles to slow the player. It is the second specimen encountered in the mansion, and the first one that chases.##APPEARANCE##It resembles an emaciated solid green humanoid figure with visible bones. Its only facial feature is a mouth with rows of white teeth, and it is missing its right hand. It has no legs, with its lower body coming to a point at the bottom.##LOCALE##The locale is a simple room resembling Small Room 1, with a puddle in the center and a note on the table. It rises from the puddle in the center when the note is put down, allowing the player to leave. The locale shows up again in room 510 of Story Mode, although the note reads as an error message, allowing the player to access the express tunnels once more.##GAMEPLAY##It rises from a puddle when enterring the room, and can be reduced back into a puddle when attacked. It can also teleport to any puddle the player has stepped on, but only when it first enters. It can float over pits, but not through walls. It is one of the few specimens that can multichase with itself when canon dupes are on due to its ability to appear from any puddle.##ORIGINAL##It no longer rises from a puddle, and can phase through walls. It starts moving in the opposite direction when attacked. A bug in the original game made it stop targetting the player after attacking, which has been patched in Recode. In its locale, it arrives from the entrance door rather than the puddle in the center.##RENOVATION##It is noticeably faster, and has a delay before attacking the player. Its puddles also slow the player much more.##STRATEGY##It is best to try and conserve stamina where you can, using it when running over puddles to negate slowness.##TRIVIA##It is based on the Lubglubs from Adventure Time.##It shares a death screen sound with Specimen 4.##Its death screen is a part of the warning screen, along with Lisa, Spooper, Tirsiak, and the original warning screen.##It also shows up on the very first warning screen in very early versions of the game.##The first letter of the words in its note spell out SIN.##It is known as WakeGel in the code of HD.
brain=In Recode, they slow you down and attempt to predict your movements. Despite their slow speed, be very cautious.
bug=Type: Active / In Testing@lTotal Fatalities: 43@lMethod: Infectious Bites##A test specimen being developed at GL Labs. Should prove useful when released. Trials have shown it is adequately effective to average subjects.
bab=Type: Active@lTotal Fatalities: 168?@lMethod: Unknown##A creature found inside the church of a small town.  Subjects are lost after contact with the specimen. Current method of killing is unknown. Proved extremely effective against subjects with mental issues or weak wills.
pup=Type: Active@lTotal Fatalities: 189@lMethod: Physical Punctures##A wooden life-sized puppet found floating in a reservoir where a town had once been. Specimen is active despite appearance and has proved very effective on subjects who disregard it or have vision impairments.
flesh=Type: Unknown@lTotal Fatalities: 93@lMethod: Unknown##Specimen is constantly changing form and attributes depending on subject's personality but most common form resembles a wall of moving anatomy symbols. Only effective on subjects with past trauma or a history of psychological issues.
dl=Type: Active@lTotal Fatalities: 149@lMethod: Absorption##A floating figure that appeared in a test chamber a few years after it was filled with what was believed to just be unusually violent deer. Specimen seems to engulf subjects and absorb them into its torso region. Proved extremely effective on violent subjects.
taker=Type: Exterminated@lTotal Fatalities: 362@lMethod: Unknown##A small skull shaped mass of clay that seemed to gain more form as subjects were TAKEN TAKEN TAKEN TAKEN TAKEN TAKEN@l..................................@lSpecimen was deemed too hard to contain and was killed and dismantled by GL Labs.
eel=Type: Docile@lTotal Fatalities: 0@lMethod: Unknown##A  worm like creature that inhabits the old rundown GL labs. A genetically modified eel that was supposed to be extremely violent but instead was very passive. Though not effective it was kept as a pet until the facility was abandoned due to specimen XX72D
para=Type: Active@lTotal Fatalities: 245@lMethod: Parasitic Infections##A form changing creature that is believed to be an extraterrestrial, though it was not officially proven. Proved very effective on most subjects, but deemed too difficult to contain. The specimen broke out of its containment area due to frequent electrical malfunctions.
fd=Type: Active@lTotal Fatalities: 317@lMethod: Unknown##A floating red figure that was found inside a secret area below a large abandoned corporate office once owned by a restaurant franchise. The specimen is extremely violent and also seems to leave the house at will despite various containment methods. Victims vanish on contact with specimen but sometimes remains of the victims have been found inside the testing chamber days later. Proved not effective as victims souls do not remain after contact.
killer=Type: Active@lTotal Fatalities: 57@lMethod: Various##An old Victorian mansion that seems to build itself around its environment. The specimen sometimes chooses a 'host' to possess and uses them to attack the subjects with various means depending on the host's characteristics. Not much is known about the origin of the mansion, but signs occasionally show an earlier massacre or tragedy has taken place within the mansion. Proved very effective, but varies itself too often to be a reliable method of extraction.
mur=Type: Active@lTotal Fatalities: 194@lMethod: Drowning##An ancient water dwelling creature believed to be a lost soul who died tragically during the Deluge. Proved extremely effective against subjects that could not swim or fell for the specimen's lure.
taker_boss=Type: Active@lTotal Fatalities: 42@lMethod: Various##A survivor from the experiments conducted at Unit 731, Specimen 9 was found hiding in a condemned farmhouse in Russia. Specimen 9 appears to be drawn to the dead or dead bodies and seems to be made up of a clay like substance that changes density.##Containment has not yet been successful, but Specimen proves very effective against all subjects.
matt_man=Type: Active@lTotal Fatalities: 23@lMethod: Screaming##A strange creature made of skin stretched over a bed frame. The specimen is basically just an invisible fast zombie with a hurt trigger and a flat textured box welded to it.##Proved very effective at making subjects scream and run away.
dolphin=Type: Active@lTotal Fatalities: 171@lMethod: Biting##A plastic surgeon who became infatuated with dolphins after a swimming experience. The surgeon then operated on himself to appear more dolphin like and was found living inside a flooded cave.##Proved extremely effective at making subjects utterly confused and creeped out.
lines=Type: Active@lTotal Fatalities: 12@lMethod: Arson##An unfinished video game AI, that is believed to contain code stolen from a terminated war experiment. ##Proved effective on some subjects, but misunderstood and ignored by others.
paina=Type: In Development@lTotal Fatalities: 66@lMethod: Unknown##A young girl that is believed to be somehow related to the 'Pied Piper' story and changes into various horrific forms to drag out the boss battle. ##In development but has proved effective on certain staff.
