eel=Tipo: Docile@lFatalita' Totali: 0@lMetodo: Sconosciuto##Una creatura simile a un verme che abita nei vecchi e abbandonati GL labs. Un'anguilla modificata geneticamente che doveva essere estremamente violenta ma si e' rivelata interamente passiva. Nonostante per niente efficace, e' stata tenuta come animale domestico, finche' la struttura non e' stata abbandonata per via del campione XX72D
eel_glitch=Tipo:@lFatalita' Totali:@lMetodo:##Errore: Display Del Campione Sbagliato!@l0001842167F
eel_alt=Tipo: Docile@lFatalita' Totali: 0@lMetodo: Sconosciuto##Una creatura simile a un verme che abita nei vecchi e abbandonati GL labs. Un'anguilla modificata geneticamente che doveva essere estremamente violenta ma si e' rivelata interamente passiva. Nonostante per niente efficace, e' stata tenuta come animale domestico, finche' la struttura non e' stata abbandonata per via del campione 110FS
para=Tipo: Attivo@lFatalita' Totali: 245@lMetodo: Infezioni Parassitarie##Una creatura mutaforma che si crede essere extraterrestre, anche se non provato ufficialmente. Provato molto efficace sulla maggior parte dei soggetti, ma considerato troppo difficile da contenere. Il campione e' scappato dalla sua area di contenimento in seguito a frequenti malfunzionamenti elettrici.
fd=Tipo: Attivo@lFatalita' Totali: 317@lMetodo: Sconosciuto##Una figura rossa fluttuante trovata dentro a un'area segreta sotto un enorme sede aziendale abbandonata posseduta in precedenza da una catena di ristoranti. Il campione e' estremamente violento e sembra pure uscire dalla casa spontaneamente nonostante i svariati tentativi di contenimento. Le vittime scompaiono al contatto con il campione, ma a volte i resti sono stati trovati nella camera di test giorni dopo. Provato non efficace in quanto le anime delle vittime non rimangono dopo il contatto.
killer=Tipo: Attivo@lFatalita' Totali: 57@lMetodo: Variabile##Una vecchia dimora vittoriana che sembra costruirsi da sola attorno all'ambiente. Il campione a volte sceglie un 'padrone' da possedere, e lo usa per attaccare i soggetti con vari metodi in base alle caratteristiche del padrone. Non molto si sa riguardo alle origini della villa, ma alcuni indizi suggeriscono un massacro o una tragedia avvenuta all'interno. Provata molto efficace, ma cambia i metodi troppo spesso per essere un metodo di estrazione affidabile.
mur=Tipo: Attivo@lFatalita' Totali: 194@lMetodo: Annegamento##Un'antica creatura dei mari presunta essere un'anima persa morta tragicamente durante il Diluvio. Provato estremamente efficace contro soggetti che non sanno nuotare o si fanno attirare dal suo richiamo.
taker_boss=Tipo: Attivo@lFatalita' Totali: 42@lMetodo: Variabile##Un sopravvissuto degli esperimenti avvenuti nell'Unita' 731, Campione 9 e' stato trovato nascosto in una fattoria inagibile in Russia. Campione 9 sembra essere attirato dai morti e sembra essere composto da una sostanza simile all'argilla che cambia densita'.##Il contenimento non e' ancora avvenuto con successo, ma il campione si rivela efficace contro tutti i soggetti.
matt_man=Tipo: Attivo@lFatalita' Totali: 23@lMetodo: Urla##Una strana creatura composta di pelle tirata sulla struttura di un letto. Il campione in sostanza e' solo uno zombie veloce invisibile con un hurt trigger e una scatola piatta con una texture fissati ad esso.##Provato molto efficace a far urlare e scappare i soggetti.
dolphin=Tipo: Attivo@lFatalita' Totali: 171@lMetodo: Morsi##Un chirurgo plastico che si e' ossessionato con i delfini dopo un'esperienza di nuoto. Il chirurgo si e' poi operato per sembrare di piu' un delfino ed e' stato trovato a vivere dentro una caverna allagata.##Provato molto efficace a rendere i soggetti molto confusi e inquietati.
lines=Tipo: Attivo@lFatalita' Totali: 12@lMetodo: Incendio##Un'IA di un videogioco non finita, che si crede contenga codice rubato da un esperimento di guerra terminato. ##Provato efficace su alcuni soggetti, ma incompreso e ignorato da altri.
paina=Tipo: In Sviluppo@lFatalita' Totali: 66@lMetodo: Sconosciuto##Una giovane ragazza che si crede in qualche modo correlata alla storia del 'Pifferaio Magico' e si trasforma in varie forme orrende per allungare la boss battle. ##In sviluppo, ma si e' rivelata efficace contro alcuni membri dello staff.

